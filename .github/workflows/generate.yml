name: Generate Protobuf Code

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proto repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.31.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate code
        run: |
          mkdir -p generated/payment generated/order
          protoc \
            --go_out=generated --go_opt=paths=source_relative \
            --go-grpc_out=generated --go-grpc_opt=paths=source_relative \
            payment/payment.proto
          protoc \
            --go_out=generated --go_opt=paths=source_relative \
            --go-grpc_out=generated --go-grpc_opt=paths=source_relative \
            order/order.proto

      - name: Checkout generated repo
        uses: actions/checkout@v3
        with:
          repository: Sula2007/ap2-generated
          token: ${{ secrets.GENERATED_REPO_TOKEN }}
          path: generated-repo

      - name: Copy generated files
        run: |
          mkdir -p generated-repo/payment generated-repo/order
          cp generated/payment/*.go generated-repo/payment/
          cp generated/order/*.go generated-repo/order/

      - name: Push to generated repo
        run: |
          cd generated-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: regenerate from ${{ github.sha }}"
          git push
